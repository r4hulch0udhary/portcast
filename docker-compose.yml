version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portcast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/portcast
      FLASK_DEBUG: "true"
      FLASK_ENV: development
      PORT: 8000
      HOST: 0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: uv run hypercorn app.main:app --bind 0.0.0.0:8000 --reload

volumes:
  postgres_data: