services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      # Persistent storage specifically for the main database
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    environment:
      # Override host references since this runs inside Docker network
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/portcast_test
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      - db
    volumes:
      - .:/app
    command: sh -c "uv run alembic upgrade head && uv run hypercorn app.main:app --bind $${HOST:-0.0.0.0}:$${PORT:-8000} --reload"

volumes:
  postgres_data: